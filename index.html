<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Our Kitchen">
  <meta name="theme-color" content="#ffffff">
  <title>Dave & Lindsey's Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f6f2;
      --bg3: #f0ede6;
      --text: #1a1a18;
      --text2: #6b6b65;
      --text3: #9b9b95;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --accent: #2C2C2A;
      --accent-text: #F1EFE8;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --bg2: #1e1e1b;
        --bg3: #252522;
        --text: #f0ece0;
        --text2: #9b9b90;
        --text3: #6b6b62;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.14);
        --accent: #e8e4d6;
        --accent-text: #1a1a18;
      }
    }

    html { height: 100%; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    .header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.25rem;
      padding-top: max(1rem, env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
      font-weight: 300;
    }

    .count-badge {
      font-size: 11px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--text2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── SEARCH ─────────────────────────────────────────────────── */
    .search-bar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0.625rem 1.25rem;
    }

    .search-bar input {
      width: 100%;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
    }

    .search-bar input::placeholder { color: var(--text3); }
    .search-bar input:focus { border-color: var(--border2); }

    /* ── TAGS ───────────────────────────────────────────────────── */
    .tag-filter {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0.625rem 1.25rem;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tag-filter::-webkit-scrollbar { display: none; }

    .tag {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .tag:hover { background: var(--bg2); }
    .tag.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

    /* ── RECIPE GRID ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    .recipe-card {
      background: var(--bg);
      padding: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .recipe-card:hover, .recipe-card:active { background: var(--bg2); }

    .recipe-emoji { font-size: 24px; line-height: 1; }

    .recipe-type {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
    }

    .recipe-name {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .recipe-tagline {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.5;
      font-weight: 300;
    }

    .recipe-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 4px;
    }

    .recipe-tag {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text2);
      border: 0.5px solid var(--border);
    }

    /* ── MODAL ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal {
      background: var(--bg);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: slideUp 0.25s ease;
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
      .modal { border-radius: var(--radius); max-height: 85vh; }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 10px auto 0;
    }

    .modal-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 0.5px solid var(--border);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-body { padding: 1.25rem; }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 10px;
      margin-top: 1.25rem;
    }
    .section-label:first-child { margin-top: 0; }

    .ingredient-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .ingredient-list li {
      font-size: 14px;
      color: var(--text);
      padding-left: 1rem;
      position: relative;
      line-height: 1.5;
    }
    .ingredient-list li::before { content: "—"; position: absolute; left: 0; color: var(--text3); }

    .step-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .step-list li {
      font-size: 14px;
      color: var(--text);
      padding-left: 2rem;
      position: relative;
      line-height: 1.6;
    }
    .step-num {
      position: absolute;
      left: 0;
      top: 1px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-weight: 500;
      flex-shrink: 0;
    }

    .note-box {
      background: var(--bg2);
      border-left: 3px solid var(--border2);
      padding: 10px 12px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      margin-top: 1rem;
    }

    .action-row {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      font-size: 13px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:hover, .action-btn:active { background: var(--bg2); }

    /* ── EMPTY STATE ────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text2);
      background: var(--bg);
      font-size: 14px;
    }
    .empty div { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Dave & Lindsey's Kitchen</h1>
      <p>A living collection of recipes built together</p>
    </div>
    <span class="count-badge" id="recipe-count"></span>
  </div>

  <div class="search-bar">
    <input type="search" id="search-input" placeholder="Search recipes..." oninput="renderGrid()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="tag-filter" id="tag-filter"></div>
  <div id="main-content"></div>
  <div id="modal-container"></div>

  const allTags = ["all", ...new Set(recipes.flatMap(r => r.tags))];
  let activeTag = "all";

  function renderTags() {
    document.getElementById("tag-filter").innerHTML = allTags.map(t =>
      `<button class="tag ${t === activeTag ? 'active' : ''}" onclick="setTag('${t}')">${t}</button>`
    ).join("");
  }

  function setTag(tag) {
    activeTag = tag;
    document.getElementById("search-input").value = "";
    renderTags();
    renderGrid();
  }

  function renderGrid() {
    const query = document.getElementById("search-input").value.toLowerCase().trim();
    const filtered = recipes.filter(r => {
      const matchTag = activeTag === "all" || r.tags.includes(activeTag);
      const matchSearch = !query || r.name.toLowerCase().includes(query) || r.tagline.toLowerCase().includes(query) || r.tags.some(t => t.includes(query));
      return matchTag && matchSearch;
    });

    document.getElementById("recipe-count").textContent = recipes.length + " recipes";
    const container = document.getElementById("main-content");

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty"><div>🍽</div>No recipes found.</div>`;
      return;
    }

    container.innerHTML = `<div class="grid">${filtered.map(r => `
      <div class="recipe-card" onclick="openRecipe(${r.id})">
        <div class="recipe-emoji">${r.emoji}</div>
        <div class="recipe-type">${r.type}</div>
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-tagline">${r.tagline}</div>
        <div class="recipe-tags">${r.tags.map(t => `<span class="recipe-tag">${t}</span>`).join("")}</div>
      </div>`).join("")}</div>`;
  }

  function openRecipe(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    document.body.style.overflow = "hidden";
    document.getElementById("modal-container").innerHTML = `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <button class="modal-close" onclick="closeRecipe()">✕</button>
            <div style="font-size:28px;margin-bottom:8px;margin-top:4px;">${r.emoji}</div>
            <div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;">${r.type}</div>
            <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--text);line-height:1.3;">${r.name}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:6px;font-weight:300;line-height:1.5;">${r.tagline}</div>
            <div style="margin-top:10px;display:flex;gap:4px;flex-wrap:wrap;">${r.tags.map(t=>`<span class="recipe-tag">${t}</span>`).join("")}</div>
          </div>
          <div class="modal-body">
            <div class="section-label">Ingredients</div>
            <ul class="ingredient-list">${r.ingredients.map(i=>`<li>${i}</li>`).join("")}</ul>
            <div class="section-label">Method</div>
            <ol class="step-list">${r.steps.map((s,i)=>`<li><span class="step-num">${i+1}</span>${s}</li>`).join("")}</ol>
            ${r.notes ? `<div class="note-box"><strong style="color:var(--text);">Notes &nbsp;</strong>${r.notes}</div>` : ""}
            <div class="action-row">
              <button class="action-btn" onclick="shareRecipe('${r.name.replace(/'/g,"\\'")}')">Share recipe</button>
              <button class="action-btn" onclick="printRecipe()">Print</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function shareRecipe(name) {
    if (navigator.share) {
      navigator.share({ title: name, text: "Recipe from Dave & Lindsey's Kitchen", url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href).then(() => alert("Link copied!"));
    }
  }

  function printRecipe() { window.print(); }

  function closeRecipe() {
    document.getElementById("modal-container").innerHTML = "";
    document.body.style.overflow = "";
  }

  function closeModal(e) {
    if (e.target.classList.contains("modal-overlay")) closeRecipe();
  }

  // Swipe down to close on mobile
  let startY = 0;
  document.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener("touchend", e => {
    const modal = document.querySelector(".modal");
    if (!modal) return;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) closeRecipe();
  }, { passive: true });

  renderTags();
  renderGrid();
  </script>
</body>
